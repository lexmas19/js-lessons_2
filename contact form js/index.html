<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="./style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Karla:wght@400;700&display=swap" rel="stylesheet" />
    <title>Contact Us</title>
  </head>
  <body>
    <main class="container">
      <h1>Contact Us</h1>
      <form>
        <div class="row">
          <div class="form-name">
            <label for="first-name">First Name *</label>
            <input type="text" id="first-name" />
            <p class="message"></p>
          </div>
          <div class="form-name">
            <label for="last-name">Last Name *</label>
            <input type="text" id="last-name" />
            <p class="message"></p>
          </div>
        </div>

        <div class="form-group">
          <label for="email">Email Address *</label>
          <input type="email" placeholder="email#example.com" id="email" />
          <p class="message"></p>
        </div>

        <div class="form-group">
          <label>Query Type *</label>
          <div class="row query-options">
            <label class="radio-card">
              <input type="radio" name="query" value="general" id="general" />
              General Enquiry
            </label>
            <label class="radio-card">
              <input type="radio" name="query" value="support" id="support" />
              Support Request
            </label>
            <p class="message"></p>
          </div>
        </div>

        <div class="form-group">
          <label for="message">Message *</label>
          <textarea id="text" rows="5"></textarea>
          <p class="message"></p>
        </div>

        <div class="checkbox-group">
          <input type="checkbox" id="consent" />
          <label for="consent">I consent to being contacted by the team *</label>
          <p class="message"></p>
        </div>
        <button type="submit" class="submit">Submit</button>
      </form>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
