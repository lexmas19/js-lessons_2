<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <form autocomplete="off" id="register-form">
      <div>
        <label for="firstName"> name: </label>
        <input type="text" id="firstName" />
        <p class="hidden errors">please enter name</p>
      </div>
      <br />
      <div>
        <label for="lastName">surname: </label>
        <input type="text" id="lastName" />
        <p class="hidden errors">please enter surname</p>
      </div>
      <br />

      <div>
        <label for="email">email: </label>
        <input type="text" id="email" />
        <p class="hidden errors">please enter email</p>
      </div>
      <br />

      <div>
        <label for="password">password</label>
        <input type="password" id="password" />
        <p class="hidden errors">please enter password</p>
      </div>

      <br />
      <div>
        <button type="submit">submit</button>
      </div>
    </form>

    <script src="./script.js"></script>
  </body>
</html>
